---
name: Checkout
description: Checkout repository internal action

inputs:
  ref:
    description: 'The branch, tag or SHA to checkout. Default: the commit that triggered the workflow.'
    required: false
    default: ""
  path:
    description: 'The directory to checkout the repository into. Default: the root of the workspace.'
    required: false
    default: "."
  token:
    description: 'GitHub token to use for authentication. Default: GITHUB_TOKEN secret.'
    required: false
    default: ""
  fetch-depth:
    description: 'Number of commits to fetch. Set to 0 to fetch all history for all branches and tags.'
    required: false
    default: "1"

runs:
  using: composite
  steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.ref }}
        path: ${{ inputs.path }}
        fetch-depth: ${{ inputs.fetch-depth }}
        token: ${{ inputs.token }}
