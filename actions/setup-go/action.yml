---
name: Setup Go
description: Setup go internal action
inputs:
  go-version:
    description: 'Version of Go to use. Default is 1.26.1.'
    required: false
    default: '1.26.1'
  use-github-go-repository:
    description: |-
      Whether to use GitHub Go repository to fetch private Go modules. Default is false. This will require
      `GITHUB_TOKEN` to be set as an environment variable. This will also enable caching of Go modules using GitHub
      Actions cache.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v6.4.0
      with:
        go-version: ${{ inputs.go-version }}
        cache: 'true'

    - name: Configure Go to use GitHub Go repository
      if: ${{ inputs.use-github-go-repository }}
      shell: bash
      run: |
        git config --global url."https://${GITHUB_TOKEN}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
        echo "GOPRIVATE=github.com/${{ github.repository }}" >> $GITHUB_ENV
        echo "GONOPROXY=github.com/${{ github.repository }}" >> $GITHUB_ENV
