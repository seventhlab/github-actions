---
name: Setup Go
description: Setup go internal action
inputs:
  go-version:
    description: 'Version of Go to use. Default is 1.26.1.'
    required: false
    default: '1.26.1'

runs:
  using: composite
  steps:
    - name: Setup Go
      uses: actions/setup-go@v6.4.0
      with:
        go-version: ${{ inputs.go-version }}
        cache: 'true'
